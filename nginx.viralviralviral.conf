# Готовый конфиг Nginx для viralviralviral.com
# Скопировать на сервер: sudo cp /var/www/my-token-site/nginx.viralviralviral.conf /etc/nginx/sites-available/nextuplabel
# Подключить: sudo ln -sf /etc/nginx/sites-available/nextuplabel /etc/nginx/sites-enabled/
# Проверить: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name viralviralviral.com www.viralviralviral.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
